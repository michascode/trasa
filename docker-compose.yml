version: '3.9'
services:
  db:
    image: postgres:16-alpine
    container_name: trasa-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trasa
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trasa"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: trasa-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/trasa?schema=public
      PORT: 4000
      JWT_SECRET: super-secret-change-me
      CORS_ORIGIN: http://localhost:5173
    ports:
      - '4000:4000'

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: trasa-frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:4000/api
    ports:
      - '5173:5173'

volumes:
  db_data:
